<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diabetes risk — prediction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <header class="hero">
      <p class="eyebrow">Pima-style inputs · linear SVM (your notebook pipeline)</p>
      <h1>Diabetes prediction</h1>
      <p class="lede">
        Enter the eight health measures below. The server runs the same
        <strong>StandardScaler</strong> + <strong>SVC(linear)</strong> model you trained in Jupyter.
      </p>
    </header>

    <main class="card">
      <form id="predict-form" class="grid" novalidate>
        <label class="field">
          <span>Pregnancies</span>
          <input name="Pregnancies" type="number" min="0" step="1" value="1" required />
        </label>
        <label class="field">
          <span>Glucose (mg/dL)</span>
          <input name="Glucose" type="number" min="0" step="1" value="120" required />
        </label>
        <label class="field">
          <span>Blood pressure (mm Hg)</span>
          <input name="BloodPressure" type="number" min="0" step="1" value="70" required />
        </label>
        <label class="field">
          <span>Skin thickness (mm)</span>
          <input name="SkinThickness" type="number" min="0" step="1" value="20" required />
        </label>
        <label class="field">
          <span>Insulin (mu U/ml)</span>
          <input name="Insulin" type="number" min="0" step="1" value="80" required />
        </label>
        <label class="field">
          <span>BMI</span>
          <input name="BMI" type="number" min="0" step="0.1" value="25" required />
        </label>
        <label class="field">
          <span>Diabetes pedigree function</span>
          <input name="DiabetesPedigreeFunction" type="number" min="0" step="0.001" value="0.5" required />
        </label>
        <label class="field">
          <span>Age (years)</span>
          <input name="Age" type="number" min="0" step="1" value="35" required />
        </label>

        <div class="actions">
          <button type="submit" class="btn primary" id="submit-btn">Run prediction</button>
        </div>
      </form>

      <div id="result" class="result hidden" role="status" aria-live="polite"></div>
      <p class="disclaimer">
        For learning only — not medical advice. See a clinician for diagnosis or treatment.
      </p>
    </main>
  </div>
  <script>
    const form = document.getElementById("predict-form");
    const resultEl = document.getElementById("result");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      resultEl.classList.add("hidden");
      submitBtn.disabled = true;
      const fd = new FormData(form);
      const body = {};
      for (const [k, v] of fd.entries()) body[k] = v;

      try {
        const res = await fetch("/api/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          resultEl.className = "result error";
          resultEl.textContent = data.error || "Request failed";
          resultEl.classList.remove("hidden");
          return;
        }
        const positive = data.outcome === 1;
        resultEl.className = "result " + (positive ? "warn" : "ok");
        resultEl.innerHTML =
          "<strong>" +
          (positive ? "Higher risk (predicted positive)" : "Lower risk (predicted negative)") +
          "</strong><span class=\"sub\">" +
          data.message +
          "</span>";
        resultEl.classList.remove("hidden");
      } catch (err) {
        resultEl.className = "result error";
        resultEl.textContent = "Network error — is the server running?";
        resultEl.classList.remove("hidden");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
